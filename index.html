<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#b8695a">
  <title>MBTI 性格探索</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
  <style>
    html { color-scheme: light; }
    body { font-family: "DM Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .skip-link { position: absolute; top: -100%; left: 8px; z-index: 1000; padding: 10px 20px; background: #b8695a; color: #fff; border-radius: 0 0 12px 12px; font-size: 0.9375rem; text-decoration: none; font-weight: 500; }
    .skip-link:focus { top: 0; }
    [data-font-status="inactive"] body,
    [data-font-status="loading"] body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  </style>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <a href="#main-content" class="skip-link">跳转到主要内容</a>

  <div class="bg-decoration" aria-hidden="true">
    <div class="bg-circle bg-circle--1"></div>
    <div class="bg-circle bg-circle--2"></div>
    <div class="bg-circle bg-circle--3"></div>
  </div>

  <main id="main-content" class="container">
    <section class="page page--active" id="page-start" aria-label="开始页面">
      <div class="card card--welcome">
        <div class="card__ornament" aria-hidden="true"></div>
        <div class="welcome-icon" aria-hidden="true">
          <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
            <circle cx="24" cy="24" r="22" stroke="#b8695a" stroke-width="2"/>
            <path d="M24 14c-3.5 0-6 2.5-6 6 0 4 6 8 6 8s6-4 6-8c0-3.5-2.5-6-6-6z" stroke="#b8695a" stroke-width="2" fill="none"/>
            <circle cx="24" cy="18" r="2.5" fill="#b8695a"/>
            <path d="M16 34c0-4 8-6 8-6s8 2 8 6" stroke="#b8695a" stroke-width="2" fill="none" stroke-linecap="round"/>
          </svg>
        </div>
        <h1 class="card__title">MBTI 性格探索</h1>
        <p class="card__subtitle">40 道题，发现你的人格密码</p>
        <ul class="feature-list">
          <li class="feature-list__item">
            <span class="feature-list__dot"></span>
            科学归类的 16 种人格类型
          </li>
          <li class="feature-list__item">
            <span class="feature-list__dot"></span>
            40 道程度选择题，约 8 分钟完成
          </li>
          <li class="feature-list__item">
            <span class="feature-list__dot"></span>
            7 级标尺，更精确地认识自己
          </li>
        </ul>
        <button id="btn-start" class="btn btn--primary" type="button">开始探索</button>
      </div>
    </section>

    <section class="page" id="page-quiz" aria-label="答题页面" role="form">
      <div class="card card--quiz">
        <div class="quiz-header">
          <div class="progress-bar" role="progressbar" aria-valuenow="1" aria-valuemin="1" aria-valuemax="40" aria-label="答题进度">
            <div class="progress-fill" id="progress-fill"></div>
          </div>
          <div class="progress-meta">
            <span class="progress-text" id="progress-text" aria-live="polite" aria-atomic="true">
              <span id="progress-current">1</span> / <span id="progress-total">28</span>
            </span>
            <span class="dimension-badge" id="dimension-indicator"></span>
          </div>
        </div>

        <h2 class="question-text" id="question-text"></h2>
        <div class="options" id="options" role="radiogroup" aria-labelledby="question-text"></div>

        <div class="error-message hidden" id="error-message" role="alert">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
            <circle cx="8" cy="8" r="7" stroke="currentColor" stroke-width="1.5"/>
            <path d="M8 5v3.5M8 11v.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          请选择一个选项
        </div>

        <div class="quiz-nav">
          <button id="btn-prev" class="btn btn--nav" type="button" disabled>
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
              <path d="M11 4L6 9l5 5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            上一题
          </button>
          <button id="btn-next" class="btn btn--primary" type="button">
            下一题
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
              <path d="M7 4l5 5-5 5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>
      </div>
    </section>

    <section class="page" id="page-result" aria-label="测试结果页面">
      <div class="card card--result" aria-live="polite" aria-atomic="true">
        <div class="result-header">
          <div class="result-icon" id="result-icon" aria-hidden="true"></div>
          <div class="result-type-wrap">
            <span class="result-type" id="result-type"></span>
          </div>
          <h2 class="result-title" id="result-title"></h2>
          <p class="result-summary" id="result-summary"></p>
        </div>

        <div class="scores" id="result-scores"></div>
        <div class="details" id="result-details"></div>

        <button id="btn-restart" class="btn btn--secondary" type="button">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
            <path d="M3 9a6 6 0 0111.2-3M15 9a6 6 0 01-11.2 3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            <path d="M14 2v4h-4M4 16v-4h4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          重新测试
        </button>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
